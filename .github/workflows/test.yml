name: Tests

on:
  push:
  pull_request:

jobs:

  tests:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: envs/environment-dev.yml
          activate-environment: project-dev
          auto-activate-base: false

      - name: Run tests
        shell: bash -el {0}
        run: pytest
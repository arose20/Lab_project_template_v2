name: Update README dynamic badges

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject GitHub repo into README
        run: |
          REPO="${GITHUB_REPOSITORY}"
          echo "Detected repo: $REPO"

          # Replace placeholder with actual repo name
          sed -i "s|{{REPO}}|$REPO|g" README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md

          git commit -m "chore: update dynamic README badges" || echo "No changes to commit"
          git push